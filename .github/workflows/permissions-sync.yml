name: Permissions Sync and Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, sqlite

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: PHP syntax check
        run: composer run syntax

      - name: PHP static analysis
        run: composer analyse

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

  tests-and-permissions:
    runs-on: ubuntu-latest
    needs:
      - php-quality
      - frontend-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, sqlite

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare SQLite DB
        run: |
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate --ansi
          php artisan config:clear

      - name: Run test suite
        run: composer test

      - name: Run migrations (no seed)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${GITHUB_WORKSPACE}/database/database.sqlite
        run: php artisan migrate --force

      - name: Sync permissions
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${GITHUB_WORKSPACE}/database/database.sqlite
        run: php artisan permissions:sync

      - name: Seed roles and permissions (optional)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${GITHUB_WORKSPACE}/database/database.sqlite
        run: php artisan db:seed --class=RolesAndPermissionsSeeder || true

      - name: Clear caches
        run: |
          php artisan cache:clear
          php artisan config:clear
